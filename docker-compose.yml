services:
  postgres:
    image: postgres:16-alpine
    container_name: api-sentinel-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-api_sentinel}
      POSTGRES_USER: ${POSTGRES_USER:-api_sentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-api_sentinel}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-api_sentinel} -d ${POSTGRES_DB:-api_sentinel}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: api-sentinel-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
