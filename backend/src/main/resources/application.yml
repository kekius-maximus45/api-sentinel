server:
  port: 8080

spring:
  application:
    name: api-sentinel
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/api_sentinel}
    username: ${DATABASE_USERNAME:api_sentinel}
    password: ${DATABASE_PASSWORD:api_sentinel}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
    open-in-view: false
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
  ai:
    mcp:
      server:
        enabled: true
        name: api-sentinel-mcp
        version: 0.1.0
        protocol: STREAMABLE
        type: SYNC
        instructions: "Use API Sentinel tools with an API key scoped to your organization."
        annotation-scanner:
          enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

api-sentinel:
  app-url: ${APP_URL:http://localhost:5173}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  jwt:
    secret: ${JWT_SECRET:local-development-secret-change-me-please}
    access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:60}
  ai:
    provider: ${AI_PROVIDER:mock}
    openai:
      base-url: ${AI_OPENAI_BASE_URL:https://api.openai.com/v1}
      api-key: ${AI_OPENAI_API_KEY:}
      model: ${AI_OPENAI_MODEL:gpt-4.1-mini}
